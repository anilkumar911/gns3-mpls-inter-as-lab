ip vrf CUSTOMER1
 rd 100:1
 route-target export 100:1
 route-target import 100:1
!
ip vrf CUSTOMER2
 rd 100:2
 route-target export 100:2
 route-target import 100:2
!
!
!
!
!
!
no ip domain lookup
ip cef
ipv6 multicast rpf use-bgp
no ipv6 cef
!
!
